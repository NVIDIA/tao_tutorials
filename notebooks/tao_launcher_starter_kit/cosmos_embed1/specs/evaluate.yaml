# Cosmos-Embed1 evaluation config (224p, MSR-VTT test_1k)
# Runs top-K classification + embedding visualization on a trained checkpoint.
#
# Usage:
#   cosmos-embed1 evaluate -e evaluate.yaml results_dir=/results \
#       dataset.test_dataset.mp4_urls="/data/video/*.mp4" \
#       dataset.test_dataset.metadata=/data/msrvtt_test_1k.json

results_dir: /results

evaluate:
  checkpoint: ${results_dir}/train/cosmos_embed1_model_latest.pth
  load_dataset_pkl: null
  save_dataset_pkl: null
  num_gpus: 1
  callbacks:
    topk_classification: true
    embedding_visualization: true
    top_k_values: [1, 3, 5, 10]
    max_eval_samples: 2000

model:
  pretrained_model_path: null
  precision: bf16
  network:
    embed_dim: 256
    num_query_tokens: 32
    max_txt_len: 128
    num_video_frames: 8
    spatial_resolution: [224, 224]
    temporal_encoding_type: neighboring_token_propagation
    contrastive_type: clip
    query_pooling_type: avg
    visual_encoder:
      type: eva_vit_g
      img_size: 224
      pretrained: false
      use_fp8: false
      transformer_engine: true

dataset:
  test_dataset:
    dataset_type: msrvtt
    mp4_urls: /data/video/*.mp4
    metadata: /data/msrvtt_test_1k.json
    num_video_frames: 8
    resolution: [224, 224]
    batch_size: 64
    workers: 4
    split: null
    random_caption: false
    caption_to_label: {}
