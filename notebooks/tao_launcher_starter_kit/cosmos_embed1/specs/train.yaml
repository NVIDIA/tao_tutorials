# Cosmos-Embed1 fine-tuning config (224p, MSR-VTT)
# Usage: cosmos-embed1 train -e train.yaml results_dir=/results

results_dir: /results

train:
  seed: 1234
  resume_training_checkpoint_path: null
  max_iter: 3000
  num_nodes: 1
  num_gpus: 1
  gpu_ids: [0]
  validation_iter: 1000
  checkpoint_iter: 1000
  optim:
    optim: fused_adamw
    lr: 1e-5
    weight_decay: 1e-5
    betas: [0.9, 0.98]
    warmup_steps: 1000
    policy: cosine
  clip_grad_norm: 3.0
  precision: bf16
  freeze_visual_encoder: true
  use_captioning_loss: true
  use_text_matching_loss: false
  loss_weights:
    contrastive_loss: 1.0
    captioning_loss: 1.0
    matching_loss: 1.0
  callbacks:
    wandb: {}
    clamp_logit_scale: {}
    logit_parameters_monitor: {}
    iter_speed: {every_n: 50, save_s3: false}
    gradient_clip: {clip_norm: 3.0}
    grad_norm_monitor: {every_n: 500, verbose: false}
    spectral_norm_monitor: {every_n: 1000, verbose: true}
    ema: {}
    log_losses: {every_n: 50, verbose: true}
    text_frames_visualizer: {every_n: 500}
    pca_feature_map_visualizer: {every_n: 500}
    validation_eval: {metrics_json_path: auto, embedding_visualization: false}

model:
  pretrained_model_path: /model/Cosmos-Embed1-224p # Can also use HF repo directly like: nvidia/Cosmos-Embed1-224p 
  precision: bf16
  lora:
    enabled: false
    lora_rank: 8
    lora_alpha: 16
    lora_dropout: 0.1
    bias: none
    use_rslora: false
    use_dora: false
    # Omit target_modules and modules_to_save to use defaults
    # (ViT+QFormer attention/MLP layers)
  network:
    embed_dim: 256
    num_query_tokens: 32
    max_txt_len: 128
    num_video_frames: 8
    spatial_resolution: [224, 224]
    temporal_encoding_type: neighboring_token_propagation
    contrastive_type: clip
    qformer_pretrain_ckpt: google-bert/bert-base-uncased
    query_pooling_type: avg
    pretrained_text_encoder: false
    pretrained_visual_encoder: false
    num_heldout_frames: 0
    visual_encoder:
      type: eva_vit_g
      img_size: 224
      pretrained: false
      use_fp8: false
      transformer_engine: true
      checkpoint_activations: false
      checkpoint_attention: false

dataset:
  # MSRVTTDataset constructor args (from build_dataset):
  #   mp4_urls: glob pattern for local video files (e.g., "/data/video/*.mp4")
  #   metadata: path to JSON file (list format: [{video_id, video, caption, ...}, ...])
  #   num_video_frames: number of frames to sample per video
  #   resolution: [H, W] target resolution
  #   split: optional split filter (for dict-format metadata with "videos"/"sentences")
  #   random_caption: randomly sample from multiple captions (True for train)
  #   caption_to_label: caption→label_id mapping ({} = auto-generate from unique captions)
  train_dataset:
    dataset_type: msrvtt
    mp4_urls: /data/video/*.mp4
    metadata: /data/msrvtt_test_1k.json # sanity check for quick demonstration
    num_video_frames: 8 
    resolution: [224, 224]
    batch_size: 4
    workers: 4
    random_caption: true
    caption_to_label: {}

  val_dataset:
    dataset_type: msrvtt
    mp4_urls: /data/video/*.mp4
    metadata: /data/msrvtt_test_1k.json
    num_video_frames: 8
    resolution: [224, 224]
    batch_size: 32
    workers: 4
    random_caption: false
    caption_to_label: {}

